---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.zipkin.name}}-service
  namespace: {{ .Release.Namespace}}
  labels:
    {{- include "infra.zipkin.labels" . | nindent 4}}
spec:
  type: ClusterIP
  selector:
    {{- include "infra.zipkin.selectorLabels" . | nindent 4}}
  ports:
    - port: 9411
      targetPort: 9411