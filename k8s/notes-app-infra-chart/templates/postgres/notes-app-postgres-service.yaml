apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Values.postgres.name }}-service
  labels:
    {{- include "infra.postgres.labels" . | nindent 4 }}
spec:
  # ClusterIP = internal only, postgres must not be exposed externally
  type: ClusterIP
  selector:
    {{- include "infra.postgres.selectorLabels" . | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432