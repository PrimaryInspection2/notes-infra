apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Values.postgres.name}}-data
  labels:
    {{- include "infra.postgres.labels" . | nindent 4 }}
spec:
  accessModes:
    # ReadWriteOnce = only one node can mount this volume at a time
    # correct for single postgres instance
    - ReadWriteOnce
  resources:
    requests:
      # increase this for production
      storage: {{ .Values.postgres.storage.size | quote }}