apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Release.Namespace }}
  name: {{ .Values.postgres.name }}-deployment
  # Labels on the Deployment object itself — pure metadata for humans and tooling.
  # Used by: kubectl get deploy -l app.kubernetes.io/name=postgres
  # NOT used by Kubernetes to route traffic or manage pods.
  labels:
    {{- include "infra.postgres.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.postgres.replicas }}
  # Recreate = stop old pod before starting new one
  # important for stateful apps with PVC (only one pod can write at a time)
  strategy:
    type: Recreate
  # Deployment uses this to find and manage its pods.
  # IMMUTABLE after first deploy — Kubernetes rejects changes to this field.
  # Must be a subset of template.metadata.labels below.
  selector:
    matchLabels:
      {{- include "infra.postgres.selectorLabels" . | nindent 6 }}
  template:
    # Labels stamped on every pod created by this Deployment.
    # Must include everything from selector.matchLabels — otherwise
    # the Deployment can't find its own pods and will fail.
    # Can have extra labels (e.g. version) that selector doesn't use.
    metadata:
      labels:
        {{- include "infra.postgres.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.postgres.name }}
          image: {{ .Values.postgres.image.repository}}:{{ .Values.postgres.image.tag}}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - containerPort: 5432
          envFrom:
            - configMapRef:
                name: {{ .Values.postgres.name }}-config
            - secretRef:
                name: {{ .Values.postgres.name }}-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # startup probe — waits for postgres to initialize before enabling liveness/readiness
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER"  # checks if postgres process is accepting connections (no db check yet)
            failureThreshold: 30  # allow up to 300s for initialization (30 * 10s)
            periodSeconds: 10     # check every 10 seconds
            timeoutSeconds: 5     # fail if no response within 5 seconds

          # liveness probe — restarts container if postgres process is dead; only runs after startupProbe passes
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER"  # checks only if process is alive, not if specific db is ready
            periodSeconds: 30     # check every 30 seconds (less frequent — just detects crashed process)
            timeoutSeconds: 5     # fail if no response within 5 seconds
            failureThreshold: 5   # more lenient — postgres may be slow under load

          # readiness probe — removes pod from service if postgres is not ready to serve traffic
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"  # checks if specific database is ready to accept connections
            periodSeconds: 10     # check every 10 seconds (more frequent — affects live traffic)
            timeoutSeconds: 3     # stricter timeout — unresponsive db should stop receiving traffic quickly
            failureThreshold: 3   # remove from service after 3 consecutive failures (3 * 10s = 30s)
          resources:
            requests:
              memory: {{ .Values.postgres.resources.requests.memory | quote}}
              cpu: {{ .Values.postgres.resources.requests.cpu | quote}}
            limits:
              memory: {{ .Values.postgres.resources.limits.memory | quote}}
              cpu: {{ .Values.postgres.resources.limits.cpu | quote}}
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: {{ .Values.postgres.name}}-data
      volumes:
        - name: {{ .Values.postgres.name}}-data
          persistentVolumeClaim:
            claimName: {{ .Values.postgres.name}}-data
      restartPolicy: Always